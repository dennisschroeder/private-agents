loki:
  image:
    tag: 2.9.3
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  loki:
    storage:
      type: filesystem
    auth_enabled: false
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push