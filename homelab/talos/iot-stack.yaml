apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: iot
spec:
  replicas: 0 # Bleibt auf 0, bis der Raspberry Pi mit den USB-Sticks da ist
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zigbee2mqtt
  template:
    metadata:
      labels:
        app: zigbee2mqtt
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64 # Zwingt den Container auf den Raspberry Pi
      tolerations:
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 10
      containers:
      - name: zigbee2mqtt
        image: koenkk/zigbee2mqtt:latest
        securityContext:
          privileged: true
        ports:
        - containerPort: 8080
          name: ui
        env:
        - name: TZ
          value: "Europe/Berlin"
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: dev
          mountPath: /dev/ttyACM0 # Pfad zum USB-Stick auf dem Pi (kann variieren)
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: zigbee2mqtt-data
      - name: dev
        hostPath:
          path: /dev/ttyACM0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zwave-js-ui
  namespace: iot
spec:
  replicas: 0 # Bleibt auf 0, bis der Raspberry Pi mit den USB-Sticks da ist
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zwave-js-ui
  template:
    metadata:
      labels:
        app: zwave-js-ui
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64 # Zwingt den Container auf den Raspberry Pi
      tolerations:
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 10
      containers:
      - name: zwave-js-ui
        image: zwavejs/zwave-js-ui:latest
        securityContext:
          privileged: true
        ports:
        - containerPort: 8091
          name: ui
        - containerPort: 3000
          name: ws
        env:
        - name: TZ
          value: "Europe/Berlin"
        volumeMounts:
        - name: data
          mountPath: /usr/src/app/store
        - name: dev
          mountPath: /dev/ttyACM1 # Pfad zum Z-Wave Stick auf dem Pi (kann variieren)
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: zwave-data
      - name: dev
        hostPath:
          path: /dev/ttyACM1
---
apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
  namespace: iot
  annotations:
    external-mdns.blakecovarrubias.com/hostnames: zigbee
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: ui
  selector:
    app: zigbee2mqtt
---
apiVersion: v1
kind: Service
metadata:
  name: zwave-js-ui
  namespace: iot
  annotations:
    external-mdns.blakecovarrubias.com/hostnames: zwave
spec:
  type: LoadBalancer
  ports:
  - port: 8091
    targetPort: 8091
    protocol: TCP
    name: ui
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: ws
  selector:
    app: zwave-js-ui
